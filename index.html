<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Card ญี่ปุ่น–ไทย</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1A1A18;
    --text2: #6B6A65;
    --text3: #A09F9A;
    --purple: #7F77DD;
    --purple-bg: #EEEDFE;
    --green: #1D9E75;
    --green-bg: #E1F5EE;
    --red: #E24B4A;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181A;
      --surface: #232325;
      --surface2: #2C2C2E;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #F0EFEA;
      --text2: #9A9993;
      --text3: #5A5955;
      --purple-bg: #26215C;
      --green-bg: #04342C;
    }
  }

  body {
    font-family: 'Sarabun', 'Noto Sans JP', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .app-title { font-size: 17px; font-weight: 600; letter-spacing: -.01em; }
  .app-title span { color: var(--purple); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .sync-status { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .sync-dot.ok { background: var(--green); }
  .sync-dot.err { background: var(--red); }
  .sync-dot.loading { background: var(--purple); animation: pulse .8s infinite alternate; }
  @keyframes pulse { from { opacity: .4; } to { opacity: 1; } }

  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: 1; min-width: 80px;
    padding: 12px 8px;
    font-size: 13px; font-weight: 500;
    color: var(--text2);
    background: transparent; border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer; transition: all .2s;
    white-space: nowrap;
  }
  .tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); }

  main { max-width: 560px; margin: 0 auto; padding: 24px 16px 80px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .progress-wrap { margin-bottom: 20px; }
  .progress-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .progress-meta .deck-name { font-size: 13px; font-weight: 500; }
  .progress-meta .progress-frac { font-size: 13px; color: var(--text2); }
  .progress-bar-track { height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--purple); border-radius: 99px; transition: width .4s ease; }

  .card-scene { perspective: 1000px; margin-bottom: 20px; cursor: pointer; user-select: none; }
  .card-inner {
    position: relative; min-height: 260px;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.4,.2,.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0; min-height: 260px;
    backface-visibility: hidden;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1.5rem; text-align: center;
  }
  .card-back { transform: rotateY(180deg); background: var(--purple-bg); }
  .card-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
  .card-kanji { font-size: 56px; font-weight: 300; line-height: 1.1; margin-bottom: 8px; }
  .card-reading { font-size: 18px; color: var(--text2); margin-bottom: 4px; }
  .card-meaning { font-size: 30px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
  .card-example {
    font-size: 13px; color: var(--text2); line-height: 1.65; max-width: 300px;
    background: var(--surface); border-radius: var(--radius-sm);
    padding: 8px 12px; border: 0.5px solid var(--border); margin-top: 4px;
  }
  .flip-hint { position: absolute; bottom: 12px; right: 14px; font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
  .tts-btn {
    margin-top: 14px; padding: 8px 18px;
    background: transparent; border: 0.5px solid var(--border2);
    border-radius: 99px; font-size: 14px; cursor: pointer;
    color: var(--text2); transition: background .15s;
  }
  .tts-btn:hover { background: var(--surface); }

  .nav-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .icon-btn {
    width: 44px; height: 44px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2); background: var(--surface);
    cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text); transition: background .15s; flex-shrink: 0;
  }
  .icon-btn:hover { background: var(--surface2); }
  .icon-btn:disabled { opacity: .3; cursor: not-allowed; }
  .score-btns { display: flex; gap: 8px; flex: 1; }
  .score-btn {
    flex: 1; height: 44px; border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: opacity .15s, transform .1s;
  }
  .score-btn:active { transform: scale(.97); opacity: .85; }
  .btn-know { background: var(--green); color: #fff; }
  .btn-skip { background: var(--surface2); color: var(--text2); }

  .done-screen { text-align: center; padding: 3rem 1rem; }
  .done-screen .big-emoji { font-size: 52px; margin-bottom: 16px; }
  .done-screen h2 { font-size: 20px; margin-bottom: 8px; }
  .done-screen p { font-size: 14px; color: var(--text2); margin-bottom: 24px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px; font-size: 13px; font-weight: 500;
    border-radius: var(--radius-sm); border: 0.5px solid var(--border2);
    background: var(--surface); color: var(--text);
    cursor: pointer; transition: background .15s;
  }
  .btn:hover { background: var(--surface2); }
  .btn-full { width: 100%; justify-content: center; }
  .btn-purple { background: var(--purple); color: #fff; border-color: var(--purple); }
  .btn-purple:hover { opacity: .9; background: var(--purple); }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 12px;
  }
  .add-form {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 24px;
  }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .field-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .field {
    width: 100%; padding: 9px 11px; font-size: 14px;
    border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text); font-family: inherit; outline: none;
  }
  .field:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(127,119,221,.15); }
  .field.span2 { grid-column: span 2; }

  .card-list { display: flex; flex-direction: column; gap: 6px; }
  .list-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--surface);
    border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    transition: border-color .15s;
  }
  .list-item:hover { border-color: var(--border2); }
  .list-word { font-size: 18px; flex: none; min-width: 50px; }
  .list-reading { font-size: 11px; color: var(--text3); flex: none; }
  .list-meaning { flex: 1; font-size: 13px; color: var(--text2); }
  .list-del {
    background: transparent; border: none; cursor: pointer;
    color: var(--text3); font-size: 18px; padding: 2px 4px; border-radius: 4px;
    transition: color .15s, background .15s; display: flex; align-items: center;
  }
  .list-del:hover { color: var(--red); background: rgba(226,75,74,.08); }
  .empty-state { text-align: center; padding: 2rem; color: var(--text3); font-size: 14px; }

  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 16px 12px; text-align: center;
  }
  .stat-num { font-size: 32px; font-weight: 600; }
  .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 4px; }
  .stat-green { color: var(--green); }
  .stat-purple { color: var(--purple); }

  .settings-group { margin-bottom: 24px; }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 0.5px solid var(--border);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row label { font-size: 14px; }
  .settings-row small { font-size: 12px; color: var(--text2); display: block; margin-top: 2px; }
  .toggle-wrap { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle-wrap input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0; background: var(--surface2);
    border-radius: 99px; cursor: pointer; transition: background .2s;
    border: 0.5px solid var(--border2);
  }
  .toggle-slider::before {
    content: ''; position: absolute; width: 18px; height: 18px;
    left: 2px; top: 2px; background: #fff; border-radius: 50%;
    transition: transform .2s; box-shadow: 0 1px 2px rgba(0,0,0,.2);
  }
  .toggle-wrap input:checked + .toggle-slider { background: var(--purple); border-color: var(--purple); }
  .toggle-wrap input:checked + .toggle-slider::before { transform: translateX(20px); }

  .api-url-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .api-url-row .field { flex: 1; font-size: 12px; }

  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: var(--text); color: var(--bg);
    padding: 9px 18px; border-radius: 99px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity .25s, transform .25s;
    pointer-events: none; z-index: 100; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .loading-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.3); z-index: 50;
    align-items: center; justify-content: center;
  }
  .loading-overlay.show { display: flex; }
  .loading-box {
    background: var(--surface); border-radius: var(--radius);
    padding: 24px 32px; text-align: center; font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--purple); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .card-kanji { font-size: 42px; }
    .card-meaning { font-size: 24px; }
    .stat-num { font-size: 24px; }
    .score-btn { font-size: 13px; height: 48px; }
    .icon-btn { width: 48px; height: 48px; }
    main { padding: 16px 12px 80px; }
    .card-face { padding: 1.5rem 1rem; min-height: 240px; }
    .card-inner { min-height: 240px; }
    .tab-btn { font-size: 12px; padding: 10px 4px; }
    header { padding: 12px 14px; }
    .btn { padding: 8px 10px; font-size: 12px; }
    .tts-btn { font-size: 13px; padding: 9px 16px; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="app-title">Flash Card <span>JP</span>–TH</div>
  <div class="header-actions">
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">—</span>
    </div>
    <button class="btn" onclick="shuffleDeck()">🔀 สุ่ม</button>
    <button class="btn" onclick="resetSession()">↺</button>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="study" onclick="setTab('study')">📚 覚える</button>
  <button class="tab-btn" data-tab="manage" onclick="setTab('manage')">✏️ Flash cards</button>
  <button class="tab-btn" data-tab="stats" onclick="setTab('stats')">📊 成績</button>
  <button class="tab-btn" data-tab="settings" onclick="setTab('settings')">⚙️ 設定</button>
</nav>

<main>
  <!-- Study -->
  <div id="panel-study" class="panel active">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="deck-name">ทุกคำ</span>
        <span class="progress-frac" id="progressFrac">0 / 0</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div id="studyArea"></div>
  </div>

  <!-- Manage -->
  <div id="panel-manage" class="panel">
    <div class="section-label">新規カード追加</div>
    <div class="add-form">
      <div class="field-grid three">
        <input class="field" id="fWord" placeholder="คำ (日本語)" />
        <input class="field" id="fRead" placeholder="อ่านว่า (よみ)" />
        <input class="field" id="fMean" placeholder="ความหมาย" />
      </div>
      <div class="field-grid">
        <input class="field span2" id="fEx" placeholder="ตัวอย่างประโยค (ถ้ามี)" />
      </div>
      <button class="btn btn-purple btn-full" onclick="addCard()" style="margin-top:8px">+ เพิ่มการ์ด</button>
    </div>
    <div class="section-label">All Cards (<span id="cardCount">0</span>)</div>
    <div id="cardList" class="card-list"></div>
  </div>

  <!-- Stats -->
  <div id="panel-stats" class="panel">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" id="sTotal">0</div><div class="stat-lbl">全カード</div></div>
      <div class="stat-card"><div class="stat-num stat-green" id="sKnow">0</div><div class="stat-lbl">覚えたカード</div></div>
      <div class="stat-card"><div class="stat-num stat-purple" id="sPct">0%</div><div class="stat-lbl">正確率</div></div>
    </div>
    <button class="btn btn-full btn-purple" onclick="resetSession()">↺ Reset</button>
  </div>

  <!-- Settings -->
  <div id="panel-settings" class="panel">
    <div class="section-label">Google Sheets</div>
    <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:24px;">
      <button class="btn btn-full" onclick="loadFromSheets()">🔄 Loading from Sheets</button>
    </div>

    <div class="section-label">การแสดงผล</div>
    <div class="settings-group" style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:0 16px;">
      <div class="settings-row">
        <div>
          <label>タイ語の面</label>
          <small>タイ語からスタート</small>
        </div>
        <label class="toggle-wrap">
          <input type="checkbox" id="toggleReverse" onchange="saveSettings()">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="settings-row">
        <div>
          <label>覚えているカードを飛ばす</label>
          <small>同じラウンドでは再表示しない</small>
        </div>
        <label class="toggle-wrap">
          <input type="checkbox" id="toggleSkipKnown" checked onchange="saveSettings()">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div id="loadingMsg">Loading...</div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwMDezki0fffUlSphhSIhzx_iXkAm8ZD9OncRB_cXCLfI3hDaAkQjbIHm5OPo0x0awY/exec';

let cards = [];
let deck = [];
let cur = 0;
let known = new Set();
let isFlipped = false;
let settings = JSON.parse(localStorage.getItem('jp_settings') || '{"reverse":false,"skipKnown":true}');
let apiUrl = localStorage.getItem('jp_api_url') || API_URL;

// ── Sync status ──
function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

// ── API ──
async function apiFetch(payload) {
  const url = apiUrl;
  if (!url) { showToast('ยังไม่ได้ตั้งค่า URL'); return null; }
  try {
    const res = await fetch(url, {
      method: payload ? 'POST' : 'GET',
      body: payload ? JSON.stringify(payload) : undefined,
      headers: payload ? { 'Content-Type': 'text/plain' } : undefined,
      redirect: 'follow',
    });
    return await res.json();
  } catch (e) {
    console.error(e);
    return null;
  }
}

async function loadFromSheets() {
  setSyncStatus('loading', 'กำลังโหลด...');
  showLoading('กำลังโหลดการ์ดจาก Google Sheets...');
  const data = await apiFetch(null);
  hideLoading();
  if (!data) {
    setSyncStatus('err', 'เชื่อมไม่ได้');
    showToast('เชื่อมต่อ Sheets ไม่ได้ — ลองใหม่');
    return;
  }
  cards = data.map((c, i) => ({ id: i + 1, word: c.word || '', reading: c.reading || '', meaning: c.meaning || '', example: c.example || '' }));
  deck = [...cards]; known = new Set(); cur = 0;
  setSyncStatus('ok', 'ซิงค์แล้ว');
  renderCard();
  if (document.querySelector('.tab-btn[data-tab="manage"]').classList.contains('active')) renderList();
  showToast('โหลด ' + cards.length + ' การ์ดแล้ว');
}

async function addCard() {
  const w = document.getElementById('fWord').value.trim();
  const r = document.getElementById('fRead').value.trim();
  const m = document.getElementById('fMean').value.trim();
  const ex = document.getElementById('fEx').value.trim();
  if (!w || !m) { showToast('กรุณาใส่คำ และ ความหมาย'); return; }

  setSyncStatus('loading', 'กำลังบันทึก...');
  showLoading('กำลังบันทึกลง Google Sheets...');
  const res = await apiFetch({ action: 'add', word: w, reading: r, meaning: m, example: ex });
  hideLoading();
  if (!res || !res.ok) {
    setSyncStatus('err', 'บันทึกไม่ได้');
    showToast('บันทึกไม่สำเร็จ — ลองใหม่');
    return;
  }
  setSyncStatus('ok', 'บันทึกแล้ว');
  ['fWord','fRead','fMean','fEx'].forEach(id => document.getElementById(id).value = '');
  await loadFromSheets();
  showToast('เพิ่มการ์ดแล้ว');
}

async function deleteCard(i) {
  const c = cards[i];
  if (!confirm('ลบ "' + c.word + '" ?')) return;
  setSyncStatus('loading', 'กำลังลบ...');
  showLoading('กำลังลบจาก Google Sheets...');
  const res = await apiFetch({ action: 'delete', word: c.word, meaning: c.meaning });
  hideLoading();
  if (!res || !res.ok) {
    setSyncStatus('err', 'ลบไม่ได้');
    showToast('ลบไม่สำเร็จ — ลองใหม่');
    return;
  }
  setSyncStatus('ok', 'ลบแล้ว');
  await loadFromSheets();
  showToast('ลบแล้ว');
}

// ── Tabs ──
function setTab(t) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  document.getElementById('panel-' + t).classList.add('active');
  if (t === 'manage') renderList();
  if (t === 'stats') renderStats();
  if (t === 'settings') {
    document.getElementById('toggleReverse').checked = settings.reverse;
    document.getElementById('toggleSkipKnown').checked = settings.skipKnown;
  }
  if (t === 'study') renderCard();
}

function saveApiUrl() {
  apiUrl = document.getElementById('apiUrlInput').value.trim();
  localStorage.setItem('jp_api_url', apiUrl);
  showToast('บันทึก URL แล้ว');
  loadFromSheets();
}

function saveSettings() {
  settings.reverse = document.getElementById('toggleReverse').checked;
  settings.skipKnown = document.getElementById('toggleSkipKnown').checked;
  localStorage.setItem('jp_settings', JSON.stringify(settings));
}

// ── Study ──
function shuffleDeck() {
  deck.sort(() => Math.random() - 0.5);
  cur = 0; known = new Set(); isFlipped = false;
  renderCard(); showToast('สุ่มลำดับใหม่แล้ว');
}
function resetSession() {
  deck = [...cards]; cur = 0; known = new Set(); isFlipped = false;
  renderCard(); showToast('เริ่มรอบใหม่');
}

function renderCard() {
  const el = document.getElementById('studyArea');
  const total = deck.length;
  const pct = total ? Math.round(known.size / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressFrac').textContent = known.size + ' / ' + total;

  const remaining = deck.filter((_, i) => !known.has(i));
  if (remaining.length === 0 && total > 0) {
    el.innerHTML = `<div class="done-screen"><div class="big-emoji">🎉</div><h2>เก่งมากเลย!</h2><p>จำครบทุกการ์ดในรอบนี้แล้ว</p><button class="btn btn-purple" onclick="resetSession()">↺ เริ่มรอบใหม่</button></div>`;
    return;
  }
  if (total === 0) {
    el.innerHTML = `<div class="done-screen"><div class="big-emoji">📭</div><h2>ยังไม่มีการ์ด</h2><p>กด 🔄 โหลดจาก Sheets หรือเพิ่มการ์ดในแท็บ "การ์ด"</p></div>`;
    return;
  }

  while (settings.skipKnown && known.has(cur)) cur = (cur + 1) % deck.length;

  const c = deck[cur];
  const rev = settings.reverse;

  const frontContent = rev
    ? `<div class="card-meaning" style="font-size:38px">${c.meaning}</div>`
    : `<div class="card-kanji">${c.word}</div>`;

  const safeWord = c.word.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const backContent = rev
    ? `<div class="card-kanji">${c.word}</div>
       <div class="card-reading">${c.reading}</div>
       <button class="tts-btn" onclick="speak(event,'${safeWord}','ja-JP')">🔊 ฟังเสียง</button>
       ${c.example ? `<div class="card-example">${c.example}</div>` : ''}`
    : `<div class="card-meaning">${c.meaning}</div>
       <div class="card-reading">${c.reading}</div>
       <button class="tts-btn" onclick="speak(event,'${safeWord}','ja-JP')">🔊 ฟังเสียง</button>
       ${c.example ? `<div class="card-example">${c.example}</div>` : ''}`;

  el.innerHTML = `
    <div class="card-scene" onclick="flipCard()">
      <div class="card-inner" id="cardInner">
        <div class="card-face">
          ${frontContent}
          <div class="flip-hint">แตะเพื่อดูคำตอบ ↩</div>
        </div>
        <div class="card-face card-back">
          ${backContent}
        </div>
      </div>
    </div>
    <div class="nav-row">
      <button class="icon-btn" onclick="go(-1,event)" ${cur===0?'disabled':''}>←</button>
      <div class="score-btns">
        <button class="score-btn btn-skip" onclick="markSkip(event)">✗ ยังไม่รู้</button>
        <button class="score-btn btn-know" onclick="markKnow(${cur},event)">✓ รู้แล้ว!</button>
      </div>
      <button class="icon-btn" onclick="go(1,event)" ${cur>=deck.length-1?'disabled':''}>→</button>
    </div>`;
  isFlipped = false;
}

function flipCard() {
  isFlipped = !isFlipped;
  const el = document.getElementById('cardInner');
  if (el) el.classList.toggle('flipped', isFlipped);
}
function go(dir, e) {
  if (e) e.stopPropagation();
  const next = cur + dir;
  if (next >= 0 && next < deck.length) { cur = next; isFlipped = false; renderCard(); }
}
function markKnow(idx, e) {
  if (e) e.stopPropagation();
  known.add(idx);
  const next = deck.findIndex((_, i) => !known.has(i) && i > idx);
  cur = next !== -1 ? next : deck.findIndex((_, i) => !known.has(i));
  if (cur === -1) cur = 0;
  isFlipped = false; renderCard();
}
function markSkip(e) { if (e) e.stopPropagation(); go(1, e); }

// ── Manage ──
function renderList() {
  document.getElementById('cardCount').textContent = cards.length;
  const el = document.getElementById('cardList');
  if (!cards.length) { el.innerHTML = '<div class="empty-state">ยังไม่มีการ์ด — กด "โหลดจาก Sheets" หรือเพิ่มด้านบน</div>'; return; }
  el.innerHTML = cards.map((c, i) => `
    <div class="list-item">
      <div class="list-word">${c.word}</div>
      <div class="list-reading">${c.reading}</div>
      <div class="list-meaning">${c.meaning}</div>
      <button class="list-del" onclick="deleteCard(${i})" title="ลบ">🗑</button>
    </div>`).join('');
}

// ── Stats ──
function renderStats() {
  document.getElementById('sTotal').textContent = cards.length;
  document.getElementById('sKnow').textContent = known.size;
  const pct = cards.length ? Math.round(known.size / cards.length * 100) : 0;
  document.getElementById('sPct').textContent = pct + '%';
}

// ── Loading ──
function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg || 'กำลังโหลด...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  const tab = document.querySelector('.tab-btn.active')?.dataset.tab;
  if (tab !== 'study') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight') go(1, null);
  if (e.key === 'ArrowLeft') go(-1, null);
  if (e.key === 'k' || e.key === 'y') markKnow(cur, null);
});

// ── TTS ──
function speak(e, text, lang) {
  if (e) e.stopPropagation();
  if (!window.speechSynthesis) { showToast('browser ไม่รองรับเสียง'); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang;
  utt.rate = 0.9;
  window.speechSynthesis.speak(utt);
}

// ── Init ──
loadFromSheets();
</script>
</body>
</html>
