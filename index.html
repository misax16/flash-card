<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Card ญี่ปุ่น–ไทย</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F6F3; --surface: #FFFFFF; --surface2: #F0EEE9;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
  --text: #1A1A18; --text2: #6B6A65; --text3: #A09F9A;
  --purple: #7F77DD; --purple-bg: #EEEDFE;
  --green: #1D9E75; --red: #E24B4A;
  --radius: 12px; --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #18181A; --surface: #232325; --surface2: #2C2C2E;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
    --text: #F0EFEA; --text2: #9A9993; --text3: #5A5955;
    --purple-bg: #26215C;
  }
}
body { font-family: 'Sarabun','Noto Sans JP','Segoe UI',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* AUTH */
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 32px 28px; width: 100%; max-width: 380px; }
.auth-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
.auth-title span { color: var(--purple); }
.auth-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
.auth-tabs { display: flex; gap: 0; border: 0.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 20px; }
.auth-tab { flex: 1; padding: 9px; font-size: 13px; font-weight: 500; background: transparent; border: none; cursor: pointer; color: var(--text2); transition: all .15s; }
.auth-tab.active { background: var(--purple); color: #fff; }
.field-wrap { margin-bottom: 12px; }
.field-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; }
.field { width: 100%; padding: 10px 12px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-family: inherit; outline: none; }
.field:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(127,119,221,.15); }
.auth-btn { width: 100%; padding: 11px; background: var(--purple); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: opacity .15s; }
.auth-btn:hover { opacity: .88; }
.auth-err { font-size: 12px; color: var(--red); margin-top: 10px; text-align: center; min-height: 18px; }
.guest-btn { width: 100%; padding: 10px; background: transparent; color: var(--text2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; margin-top: 8px; transition: background .15s; }
.guest-btn:hover { background: var(--surface2); }
.divider { text-align: center; font-size: 12px; color: var(--text3); margin: 14px 0; }

/* APP */
#appWrap { display: none; }
header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.app-title { font-size: 16px; font-weight: 600; }
.app-title span { color: var(--purple); }
.header-right { display: flex; align-items: center; gap: 8px; }
.user-badge { font-size: 12px; color: var(--text2); background: var(--surface2); padding: 4px 10px; border-radius: 99px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; display: inline-block; }
.sync-dot.ok { background: var(--green); }
.sync-dot.err { background: var(--red); }
.sync-dot.loading { background: var(--purple); animation: pulse .8s infinite alternate; }
@keyframes pulse { from{opacity:.4}to{opacity:1} }

.tabs { display: flex; background: var(--surface); border-bottom: 0.5px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab-btn { flex: 1; min-width: 72px; padding: 11px 6px; font-size: 13px; font-weight: 500; color: var(--text2); background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all .2s; white-space: nowrap; }
.tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); }

main { max-width: 560px; margin: 0 auto; padding: 20px 14px 80px; }
.panel { display: none; } .panel.active { display: block; }

/* PROGRESS */
.progress-wrap { margin-bottom: 18px; }
.progress-meta { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 13px; }
.progress-meta .deck-name { font-weight: 500; }
.progress-meta .frac { color: var(--text2); }
.progress-track { height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--purple); border-radius: 99px; transition: width .4s; }

/* CARD */
.card-scene { perspective: 1000px; margin-bottom: 18px; cursor: pointer; user-select: none; }
.card-inner { position: relative; min-height: 250px; transform-style: preserve-3d; transition: transform .55s cubic-bezier(.4,.2,.2,1); }
.card-inner.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; inset: 0; min-height: 250px; backface-visibility: hidden; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; text-align: center; }
.card-back { transform: rotateY(180deg); background: var(--purple-bg); }
.card-kanji { font-size: 54px; font-weight: 300; line-height: 1.1; margin-bottom: 6px; }
.card-reading { font-size: 17px; color: var(--text2); margin-bottom: 8px; }
.card-meaning { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
.card-example { font-size: 13px; color: var(--text2); line-height: 1.65; max-width: 300px; background: var(--surface); border-radius: var(--radius-sm); padding: 8px 12px; border: 0.5px solid var(--border); margin-top: 4px; }
.flip-hint { position: absolute; bottom: 12px; right: 14px; font-size: 11px; color: var(--text3); }
.tts-btn { margin-top: 12px; padding: 7px 16px; background: transparent; border: 0.5px solid var(--border2); border-radius: 99px; font-size: 13px; cursor: pointer; color: var(--text2); transition: background .15s; }
.tts-btn:hover { background: var(--surface); }

/* NAV */
.nav-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.icon-btn { width: 46px; height: 46px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; color: var(--text); transition: background .15s; flex-shrink: 0; }
.icon-btn:hover { background: var(--surface2); }
.icon-btn:disabled { opacity: .3; cursor: not-allowed; }
.score-btns { display: flex; gap: 8px; flex: 1; }
.score-btn { flex: 1; height: 46px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: opacity .15s, transform .1s; }
.score-btn:active { transform: scale(.97); }
.btn-know { background: var(--green); color: #fff; }
.btn-skip { background: var(--surface2); color: var(--text2); }

.done-screen { text-align: center; padding: 3rem 1rem; }
.done-screen .big-emoji { font-size: 52px; margin-bottom: 14px; }
.done-screen h2 { font-size: 20px; margin-bottom: 8px; }
.done-screen p { font-size: 14px; color: var(--text2); margin-bottom: 20px; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); cursor: pointer; transition: background .15s; }
.btn:hover { background: var(--surface2); }
.btn-full { width: 100%; justify-content: center; }
.btn-purple { background: var(--purple); color: #fff; border-color: var(--purple); }
.btn-purple:hover { opacity: .9; background: var(--purple); }
.btn-red { color: var(--red); border-color: var(--red); }

/* MANAGE */
.section-label { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
.add-form { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 20px; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.field-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.field.span2 { grid-column: span 2; }
.card-list { display: flex; flex-direction: column; gap: 6px; }
.list-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); }
.list-word { font-size: 18px; flex: none; min-width: 48px; }
.list-reading { font-size: 11px; color: var(--text3); flex: none; }
.list-meaning { flex: 1; font-size: 13px; color: var(--text2); }
.list-del { background: transparent; border: none; cursor: pointer; color: var(--text3); font-size: 17px; padding: 2px 4px; border-radius: 4px; transition: color .15s; display: flex; align-items: center; }
.list-del:hover { color: var(--red); }
.empty-state { text-align: center; padding: 2rem; color: var(--text3); font-size: 14px; }

/* STATS */
.stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 10px; text-align: center; }
.stat-num { font-size: 30px; font-weight: 600; }
.stat-lbl { font-size: 11px; color: var(--text2); margin-top: 3px; }
.stat-green { color: var(--green); }
.stat-purple { color: var(--purple); }

/* SETTINGS */
.settings-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 0 16px; margin-bottom: 20px; }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 0.5px solid var(--border); }
.settings-row:last-child { border-bottom: none; }
.settings-row label { font-size: 14px; }
.settings-row small { font-size: 12px; color: var(--text2); display: block; margin-top: 2px; }
.toggle-wrap { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.toggle-wrap input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--surface2); border-radius: 99px; cursor: pointer; transition: background .2s; border: 0.5px solid var(--border2); }
.toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 2px; top: 2px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
.toggle-wrap input:checked + .toggle-slider { background: var(--purple); border-color: var(--purple); }
.toggle-wrap input:checked + .toggle-slider::before { transform: translateX(20px); }

/* TOAST */
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--text); color: var(--bg); padding: 9px 18px; border-radius: 99px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; z-index: 200; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* LOADING */
.loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 150; align-items: center; justify-content: center; }
.loading-overlay.show { display: flex; }
.loading-box { background: var(--surface); border-radius: var(--radius); padding: 24px 32px; text-align: center; font-size: 14px; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to{transform:rotate(360deg)} }

@media (max-width: 480px) {
  .card-kanji { font-size: 42px; }
  .card-meaning { font-size: 22px; }
  .stat-num { font-size: 24px; }
  .score-btn { font-size: 13px; height: 48px; }
  main { padding: 14px 10px 80px; }
  .card-face { padding: 1.5rem 1rem; min-height: 230px; }
  .card-inner { min-height: 230px; }
  .field-grid.three { grid-template-columns: 1fr 1fr; }
  .field-grid.three .field:last-child { grid-column: span 2; }
  .auth-box { padding: 24px 18px; }
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- AUTH -->
<div id="authWrap" class="auth-wrap">
  <div class="auth-box">
    <div class="auth-title">Flash Card <span>JP</span>–TH</div>
    <div class="auth-sub">log in to learn & play </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="setAuthTab('login')">Log in</button>
      <button class="auth-tab" onclick="setAuthTab('register')">Register</button>
    </div>
    <div class="field-wrap">
      <div class="field-label">E-mail</div>
      <input class="field" id="authEmail" type="email" placeholder="email@example.com" />
    </div>
    <div class="field-wrap">
      <div class="field-label">Pass word</div>
      <input class="field" id="authPassword" type="password" placeholder="••••••••" />
    </div>
    <div id="authNameWrap" class="field-wrap" style="display:none">
      <div class="field-label">Display name</div>
      <input class="field" id="authName" type="text" placeholder="ชื่อของคุณ" />
    </div>
    <button class="auth-btn" id="authSubmitBtn" onclick="handleAuth()">Log in</button>
    <div class="auth-err" id="authErr"></div>
    <div class="divider">— Or —</div>
    <button class="guest-btn" onclick="handleGuest()">👤 Log in as Guest (not be recorded)</button>
  </div>
</div>

<!-- APP -->
<div id="appWrap">
  <header>
    <div class="app-title">Flash Card <span>JP</span>–TH</div>
    <div class="header-right">
      <span class="sync-dot" id="syncDot"></span>
      <span class="user-badge" id="userBadge">—</span>
      <button class="btn" onclick="shuffleDeck()">🔀</button>
      <button class="btn" onclick="handleLogout()">Log out</button>
    </div>
  </header>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="study" onclick="setTab('study')">📚 覚える</button>
    <button class="tab-btn admin-only" data-tab="manage" onclick="setTab('manage')" style="display:none">✏️ カード</button>
    <button class="tab-btn" data-tab="stats" onclick="setTab('stats')">📊 成績</button>
    <button class="tab-btn" data-tab="settings" onclick="setTab('settings')">⚙️ 設定</button>
  </nav>
  <main>
    <!-- Study -->
    <div id="panel-study" class="panel active">
      <div class="progress-wrap">
        <div class="progress-meta">
          <span class="deck-name">ทุกคำ</span>
          <span class="frac" id="progressFrac">0 / 0</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>
      <div id="studyArea"></div>
    </div>
    <!-- Manage -->
    <div id="panel-manage" class="panel">
      <div class="section-label">เพิ่มการ์ดใหม่</div>
      <div class="add-form">
        <div class="field-grid three">
          <input class="field" id="fWord" placeholder="คำ (日本語)" />
          <input class="field" id="fRead" placeholder="อ่านว่า (よみ)" />
          <input class="field" id="fMean" placeholder="ความหมาย" />
        </div>
        <div class="field-grid">
          <input class="field span2" id="fEx" placeholder="ตัวอย่างประโยค (ถ้ามี)" />
        </div>
        <button class="btn btn-purple btn-full" onclick="addCard()" style="margin-top:8px">+ เพิ่มการ์ด</button>
      </div>
      <div class="section-label">การ์ดทั้งหมด (<span id="cardCount">0</span>)</div>
      <div id="cardList" class="card-list"></div>
    </div>
    <!-- Stats -->
    <div id="panel-stats" class="panel">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num" id="sTotal">0</div><div class="stat-lbl">การ์ดทั้งหมด</div></div>
        <div class="stat-card"><div class="stat-num stat-green" id="sKnow">0</div><div class="stat-lbl">จำได้แล้ว</div></div>
        <div class="stat-card"><div class="stat-num stat-purple" id="sPct">0%</div><div class="stat-lbl">ความแม่น</div></div>
      </div>
      <button class="btn btn-full btn-purple" onclick="resetSession()">↺ เริ่มรอบใหม่</button>
    </div>
    <!-- Settings -->
    <div id="panel-settings" class="panel">
      <div class="section-label">Google Sheets</div>
      <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:20px;">
        <button class="btn btn-full" onclick="loadFromSheets()">🔄 โหลดการ์ดจาก Sheets</button>
      </div>
      <div class="section-label">การแสดงผล</div>
      <div class="settings-box">
        <div class="settings-row">
          <div><label>แสดงด้านไทยก่อน</label><small>เริ่มจากความหมายภาษาไทย</small></div>
          <label class="toggle-wrap"><input type="checkbox" id="toggleReverse" onchange="saveSettings()"><span class="toggle-slider"></span></label>
        </div>
        <div class="settings-row">
          <div><label>ข้ามการ์ดที่จำได้แล้ว</label><small>ไม่แสดงซ้ำในรอบเดิม</small></div>
          <label class="toggle-wrap"><input type="checkbox" id="toggleSkipKnown" checked onchange="saveSettings()"><span class="toggle-slider"></span></label>
        </div>
      </div>
      <div id="accountSection"></div>
    </div>
  </main>
</div>

<div id="toast"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box"><div class="spinner"></div><div id="loadingMsg">กำลังโหลด...</div></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInAnonymously, signOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCZWFJiZvOXx_QFTJzgOIZhGTrlao9TpsY",
  authDomain: "flashcard-jp.firebaseapp.com",
  projectId: "flashcard-jp",
  storageBucket: "flashcard-jp.firebasestorage.app",
  messagingSenderId: "243011392490",
  appId: "1:243011392490:web:82de7f453065a5ea219893"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── SHEETS API ──
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwMDezki0fffUlSphhSIhzx_iXkAm8ZD9OncRB_cXCLfI3hDaAkQjbIHm5OPo0x0awY/exec';

// ── ADMIN ──
const ADMIN_EMAIL = 'nininyanko4@gmail.com';
function isAdmin() { return currentUser && !currentUser.isAnonymous && currentUser.email === ADMIN_EMAIL; }

// ── STATE ──
let cards = [], deck = [], cur = 0, known = new Set(), isFlipped = false;
let currentUser = null, isGuest = false;
let settings = JSON.parse(localStorage.getItem('jp_settings') || '{"reverse":false,"skipKnown":true}');

// ── AUTH TAB ──
window.setAuthTab = (t) => {
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', ['login','register'][i] === t));
  document.getElementById('authNameWrap').style.display = t === 'register' ? 'block' : 'none';
  document.getElementById('authSubmitBtn').textContent = t === 'register' ? 'สมัครสมาชิก' : 'เข้าสู่ระบบ';
  document.getElementById('authErr').textContent = '';
};

window.handleAuth = async () => {
  const email = document.getElementById('authEmail').value.trim();
  const pass = document.getElementById('authPassword').value;
  const name = document.getElementById('authName').value.trim();
  const isReg = document.getElementById('authSubmitBtn').textContent === 'สมัครสมาชิก';
  document.getElementById('authErr').textContent = '';
  if (!email || !pass) { document.getElementById('authErr').textContent = 'กรุณากรอกอีเมลและรหัสผ่าน'; return; }
  showLoading(isReg ? 'กำลังสมัครสมาชิก...' : 'กำลังเข้าสู่ระบบ...');
  try {
    if (isReg) {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      if (name) await updateProfile(cred.user, { displayName: name });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch(e) {
    hideLoading();
    const msgs = { 'auth/email-already-in-use':'อีเมลนี้ถูกใช้แล้ว', 'auth/invalid-email':'อีเมลไม่ถูกต้อง', 'auth/weak-password':'รหัสผ่านต้องมีอย่างน้อย 6 ตัว', 'auth/invalid-credential':'อีเมลหรือรหัสผ่านไม่ถูกต้อง', 'auth/user-not-found':'ไม่พบบัญชีนี้' };
    document.getElementById('authErr').textContent = msgs[e.code] || e.message;
  }
};

window.handleGuest = async () => {
  showLoading('กำลังเข้าแบบ Guest...');
  isGuest = true;
  try { await signInAnonymously(auth); } catch(e) { hideLoading(); showToast('เข้า Guest ไม่ได้: ' + e.message); }
};

window.handleLogout = async () => {
  if (!confirm('ออกจากระบบ?')) return;
  await signOut(auth);
};

// ── AUTH STATE ──
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('authWrap').style.display = 'none';
    document.getElementById('appWrap').style.display = 'block';
    const name = user.isAnonymous ? 'Guest' : (user.displayName || user.email);
    document.getElementById('userBadge').textContent = name;
    // show admin tab
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = (user.email === ADMIN_EMAIL ? '' : 'none'));
    // load settings from firestore
    if (!user.isAnonymous) {
      const snap = await getDoc(doc(db, 'users', user.uid, 'meta', 'settings'));
      if (snap.exists()) { settings = snap.data(); applySettings(); }
      // load progress
      const pSnap = await getDoc(doc(db, 'users', user.uid, 'meta', 'progress'));
      if (pSnap.exists() && pSnap.data().known) known = new Set(pSnap.data().known);
    }
    await loadFromSheets();
    renderCard();
    hideLoading();
  } else {
    currentUser = null; isGuest = false;
    document.getElementById('authWrap').style.display = 'flex';
    document.getElementById('appWrap').style.display = 'none';
    hideLoading();
  }
});

// ── SAVE PROGRESS TO FIRESTORE ──
async function saveProgress() {
  if (!currentUser || currentUser.isAnonymous) return;
  try {
    await setDoc(doc(db, 'users', currentUser.uid, 'meta', 'progress'), { known: [...known] });
  } catch(e) { console.warn('saveProgress', e); }
}

// ── SHEETS ──
window.loadFromSheets = async () => {
  setSyncStatus('loading');
  showLoading('กำลังโหลดการ์ดจาก Google Sheets...');
  try {
    const res = await fetch(SHEETS_URL, { redirect: 'follow' });
    const data = await res.json();
    cards = data.map((c,i) => ({ id:i+1, word:c.word||'', reading:c.reading||'', meaning:c.meaning||'', example:c.example||'' }));
    deck = [...cards];
    setSyncStatus('ok');
    renderCard();
    if (document.querySelector('.tab-btn[data-tab="manage"]')?.classList.contains('active')) renderList();
    showToast('โหลด ' + cards.length + ' การ์ดแล้ว');
  } catch(e) {
    setSyncStatus('err');
    showToast('โหลดไม่ได้ — ลองใหม่');
  }
  hideLoading();
};

async function apiPost(payload) {
  const res = await fetch(SHEETS_URL, { method:'POST', body: JSON.stringify(payload), headers:{'Content-Type':'text/plain'}, redirect:'follow' });
  return res.json();
}

// ── TABS ──
window.setTab = (t) => {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  document.getElementById('panel-' + t).classList.add('active');
  if (t === 'manage') renderList();
  if (t === 'stats') renderStats();
  if (t === 'settings') {
    document.getElementById('toggleReverse').checked = settings.reverse;
    document.getElementById('toggleSkipKnown').checked = settings.skipKnown;
    renderAccountSection();
  }
};

function renderAccountSection() {
  const el = document.getElementById('accountSection');
  if (!currentUser || currentUser.isAnonymous) {
    el.innerHTML = `<div class="section-label" style="margin-top:20px">บัญชี</div><div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;font-size:13px;color:var(--text2)">คุณกำลังใช้งานแบบ Guest — <a href="#" onclick="handleLogout();return false" style="color:var(--purple)">สมัครสมาชิก</a>เพื่อบันทึกความคืบหน้า</div>`;
  } else {
    el.innerHTML = `<div class="section-label" style="margin-top:20px">บัญชี</div><div class="settings-box"><div class="settings-row"><div><label>${currentUser.displayName || currentUser.email}</label><small>${currentUser.email}</small></div></div></div><button class="btn btn-full btn-red" onclick="handleLogout()" style="margin-top:8px">ออกจากระบบ</button>`;
  }
}

// ── SETTINGS ──
window.saveSettings = async () => {
  settings.reverse = document.getElementById('toggleReverse').checked;
  settings.skipKnown = document.getElementById('toggleSkipKnown').checked;
  localStorage.setItem('jp_settings', JSON.stringify(settings));
  if (currentUser && !currentUser.isAnonymous) {
    try { await setDoc(doc(db, 'users', currentUser.uid, 'meta', 'settings'), settings); } catch(e){}
  }
};

function applySettings() {
  document.getElementById('toggleReverse').checked = settings.reverse || false;
  document.getElementById('toggleSkipKnown').checked = settings.skipKnown !== false;
}

// ── STUDY ──
window.shuffleDeck = () => { deck.sort(()=>Math.random()-.5); cur=0; known=new Set(); isFlipped=false; renderCard(); showToast('สุ่มลำดับใหม่แล้ว'); };
window.resetSession = () => { deck=[...cards]; cur=0; known=new Set(); isFlipped=false; renderCard(); showToast('เริ่มรอบใหม่'); };

function renderCard() {
  const el = document.getElementById('studyArea');
  const total = deck.length;
  const pct = total ? Math.round(known.size/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressFrac').textContent = known.size + ' / ' + total;

  const remaining = deck.filter((_,i) => !known.has(i));
  if (remaining.length === 0 && total > 0) {
    el.innerHTML = `<div class="done-screen"><div class="big-emoji">🎉</div><h2>เก่งมากเลย!</h2><p>จำครบทุกการ์ดในรอบนี้แล้ว</p><button class="btn btn-purple" onclick="resetSession()">↺ เริ่มรอบใหม่</button></div>`;
    return;
  }
  if (total === 0) {
    el.innerHTML = `<div class="done-screen"><div class="big-emoji">📭</div><h2>ยังไม่มีการ์ด</h2><p>กด 🔄 โหลดจาก Sheets หรือเพิ่มในแท็บ "การ์ด"</p></div>`;
    return;
  }
  while (settings.skipKnown && known.has(cur)) cur = (cur+1) % deck.length;
  const c = deck[cur];
  const rev = settings.reverse;
  const safeWord = c.word.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const frontContent = rev ? `<div class="card-meaning" style="font-size:34px">${c.meaning}</div>` : `<div class="card-kanji">${c.word}</div>`;
  const backContent = rev
    ? `<div class="card-kanji">${c.word}</div><div class="card-reading">${c.reading}</div><button class="tts-btn" onclick="speak(event,'${safeWord}','ja-JP')">🔊 ฟังเสียง</button>${c.example?`<div class="card-example">${c.example}</div>`:''}`
    : `<div class="card-meaning">${c.meaning}</div><div class="card-reading">${c.reading}</div><button class="tts-btn" onclick="speak(event,'${safeWord}','ja-JP')">🔊 ฟังเสียง</button>${c.example?`<div class="card-example">${c.example}</div>`:''}`;

  el.innerHTML = `
    <div class="card-scene" onclick="flipCard()">
      <div class="card-inner" id="cardInner">
        <div class="card-face">${frontContent}<div class="flip-hint">แตะเพื่อดูคำตอบ ↩</div></div>
        <div class="card-face card-back">${backContent}</div>
      </div>
    </div>
    <div class="nav-row">
      <button class="icon-btn" onclick="go(-1,event)" ${cur===0?'disabled':''}>←</button>
      <div class="score-btns">
        <button class="score-btn btn-skip" onclick="markSkip(event)">✗ ยังไม่รู้</button>
        <button class="score-btn btn-know" onclick="markKnow(${cur},event)">✓ รู้แล้ว!</button>
      </div>
      <button class="icon-btn" onclick="go(1,event)" ${cur>=deck.length-1?'disabled':''}>→</button>
    </div>`;
  isFlipped = false;
}

window.flipCard = () => { isFlipped=!isFlipped; document.getElementById('cardInner')?.classList.toggle('flipped',isFlipped); };
window.go = (dir,e) => { if(e)e.stopPropagation(); const n=cur+dir; if(n>=0&&n<deck.length){cur=n;isFlipped=false;renderCard();} };
window.markKnow = (idx,e) => {
  if(e)e.stopPropagation();
  known.add(idx);
  const next = deck.findIndex((_,i)=>!known.has(i)&&i>idx);
  cur = next!==-1 ? next : (deck.findIndex((_,i)=>!known.has(i)) ?? 0);
  if(cur===-1) cur=0;
  isFlipped=false; renderCard();
  saveProgress();
};
window.markSkip = (e) => { if(e)e.stopPropagation(); go(1,e); };

// ── MANAGE ──
function renderList() {
  document.getElementById('cardCount').textContent = cards.length;
  const el = document.getElementById('cardList');
  if (!cards.length) { el.innerHTML = '<div class="empty-state">ยังไม่มีการ์ด</div>'; return; }
  el.innerHTML = cards.map((c,i) => `<div class="list-item"><div class="list-word">${c.word}</div><div class="list-reading">${c.reading}</div><div class="list-meaning">${c.meaning}</div><button class="list-del" onclick="deleteCard(${i})">🗑</button></div>`).join('');
}

window.addCard = async () => {
  if (!isAdmin()) { showToast('เฉพาะ Admin เท่านั้น'); return; }
  const w=document.getElementById('fWord').value.trim(), r=document.getElementById('fRead').value.trim();
  const m=document.getElementById('fMean').value.trim(), ex=document.getElementById('fEx').value.trim();
  if (!w||!m) { showToast('กรุณาใส่คำ และ ความหมาย'); return; }
  setSyncStatus('loading'); showLoading('กำลังบันทึก...');
  const res = await apiPost({action:'add',word:w,reading:r,meaning:m,example:ex});
  hideLoading();
  if (!res?.ok) { setSyncStatus('err'); showToast('บันทึกไม่สำเร็จ'); return; }
  ['fWord','fRead','fMean','fEx'].forEach(id=>document.getElementById(id).value='');
  await loadFromSheets();
  showToast('เพิ่มการ์ดแล้ว');
};

window.deleteCard = async (i) => {
  if (!isAdmin()) { showToast('เฉพาะ Admin เท่านั้น'); return; }
  const c=cards[i];
  if (!confirm('ลบ "'+c.word+'" ?')) return;
  setSyncStatus('loading'); showLoading('กำลังลบ...');
  const res = await apiPost({action:'delete',word:c.word,meaning:c.meaning});
  hideLoading();
  if (!res?.ok) { setSyncStatus('err'); showToast('ลบไม่สำเร็จ'); return; }
  await loadFromSheets();
  showToast('ลบแล้ว');
};

// ── STATS ──
function renderStats() {
  document.getElementById('sTotal').textContent = cards.length;
  document.getElementById('sKnow').textContent = known.size;
  document.getElementById('sPct').textContent = (cards.length ? Math.round(known.size/cards.length*100) : 0) + '%';
}

// ── TTS ──
window.speak = (e,text,lang) => {
  if(e)e.stopPropagation();
  if(!window.speechSynthesis){showToast('browser ไม่รองรับเสียง');return;}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang=lang; u.rate=0.9;
  window.speechSynthesis.speak(u);
};

// ── SYNC DOT ──
function setSyncStatus(s) {
  const d=document.getElementById('syncDot');
  d.className='sync-dot '+(s==='ok'?'ok':s==='err'?'err':'loading');
}

// ── LOADING ──
function showLoading(msg){document.getElementById('loadingMsg').textContent=msg||'กำลังโหลด...';document.getElementById('loadingOverlay').classList.add('show');}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show');}

// ── TOAST ──
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
window.showToast = showToast;

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (document.getElementById('authWrap').style.display!=='none') return;
  const tab=document.querySelector('.tab-btn.active')?.dataset.tab;
  if (tab!=='study') return;
  if (e.key===' '||e.key==='Enter'){e.preventDefault();flipCard();}
  if (e.key==='ArrowRight') go(1,null);
  if (e.key==='ArrowLeft') go(-1,null);
  if (e.key==='k'||e.key==='y') markKnow(cur,null);
});
</script>
